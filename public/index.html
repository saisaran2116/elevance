<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevance | Premium Internship Platform</title>
  <meta name="description" content="Elevance Internship Platform - Login Tracking and Premium Security Control Center. Monitor your account security and device logins.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <header class="app-header">
    <div class="header-container">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap logo-icon"></i>
        <span class="logo-text">ELEVANCE</span>
      </div>
      <nav class="app-nav">
        <button id="nav-btn-auth" class="nav-link active" onclick="switchTab('auth')">
          <i class="fa-solid fa-right-to-bracket"></i> Access
        </button>
        <button id="nav-btn-profile" class="nav-link hidden" onclick="switchTab('profile')">
          <i class="fa-solid fa-user-shield"></i> Profile & Security
        </button>
        <button id="nav-btn-logout" class="nav-link hidden logout-btn" onclick="handleLogout()">
          <i class="fa-solid fa-power-off"></i> Logout
        </button>
      </nav>
    </div>
  </header>
    <main class="main-content">
    <!-- AUTH SECTION (Login / Register Card) -->
    <section id="section-auth" class="section-container active">
      <div class="auth-card glass-panel">
        <div class="auth-tabs">
          <button id="tab-btn-login" class="auth-tab active" onclick="setAuthMode('login')">Login</button>
          <button id="tab-btn-register" class="auth-tab" onclick="setAuthMode('register')">Register</button>
        </div>

        <div id="auth-forms-container">
          <!-- LOGIN FORM -->
          <form id="form-login" class="auth-form active" onsubmit="submitLogin(event)">
            <h2 class="form-title">Welcome Back</h2>
            <p class="form-subtitle">Enter your credentials to access your dashboard.</p>
            
            <div id="login-error-alert" class="alert-box error hidden"></div>
            
            <div class="input-group">
              <label for="login-email">Email Address</label>
              <div class="input-wrapper">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="login-email" required placeholder="name@example.com" autocomplete="email">
              </div>
            </div>

            <div class="input-group">
              <label for="login-password">Password</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" id="login-password" required placeholder="••••••••" autocomplete="current-password">
              </div>
            </div>

            <button type="submit" id="btn-login-submit" class="btn-primary">
              <span>Sign In</span>
              <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
          </form>

          <!-- REGISTER FORM -->
          <form id="form-register" class="auth-form hidden" onsubmit="submitRegister(event)">
            <h2 class="form-title">Create Account</h2>
            <p class="form-subtitle">Join the premium internship network today.</p>

            <div id="register-error-alert" class="alert-box error hidden"></div>
            <div id="register-success-alert" class="alert-box success hidden"></div>

            <div class="input-group">
              <label for="register-name">Full Name</label>
              <div class="input-wrapper">
                <i class="fa-regular fa-user input-icon"></i>
                <input type="text" id="register-name" required placeholder="Alex Mercer" autocomplete="name">
              </div>
            </div>

            <div class="input-group">
              <label for="register-email">Email Address</label>
              <div class="input-wrapper">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="register-email" required placeholder="alex@example.com" autocomplete="email">
              </div>
            </div>

            <div class="input-group">
              <label for="register-phone">Phone Number</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" id="register-phone" placeholder="+1 (555) 000-0000" autocomplete="tel">
              </div>
            </div>

            <div class="form-row">
              <div class="input-group half-width">
                <label for="register-language">Preferred Language</label>
                <div class="select-wrapper">
                  <select id="register-language">
                    <option value="en" selected>English</option>
                    <option value="es">Español</option>
                    <option value="hi">हिन्दी</option>
                    <option value="pt">Português</option>
                    <option value="zh">中文</option>
                    <option value="fr">Français</option>
                  </select>
                </div>
              </div>

              <div class="input-group half-width">
                <label for="register-password">Password</label>
                <div class="input-wrapper">
                  <i class="fa-solid fa-lock input-icon"></i>
                  <input type="password" id="register-password" required placeholder="••••••••" autocomplete="new-password">
                </div>
              </div>
            </div>

            <button type="submit" id="btn-register-submit" class="btn-primary">
              <span>Create Account</span>
              <i class="fa-solid fa-user-plus"></i>
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <footer class="app-footer">
    <div class="footer-container">
      <p>&copy; 2026 Elevance Internship Platform. All security events are encrypted and logged.</p>
    </div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
