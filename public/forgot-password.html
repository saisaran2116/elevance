<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Elevance</title>
  <meta name="description" content="Securely generate a new access password for your Elevance internship account.">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Core Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated Background Canvas / Glowing Orbs -->
  <div class="bg-glow-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <header class="app-header">
    <div class="header-container">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap logo-icon"></i>
        <span class="logo-text">ELEVANCE</span>
      </div>
      <nav class="app-nav">
        <a href="index.html" class="nav-link">
          <i class="fa-solid fa-arrow-left-long"></i> Back to Access
        </a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <section class="section-container active">
      <div class="auth-card glass-panel">
        <div class="auth-tabs">
          <button class="auth-tab active" style="width: 100%; cursor: default;">Reset Account Password</button>
        </div>

        <div id="auth-forms-container">
          <form id="form-forgot-password" class="auth-form active">
            <h2 class="form-title">Trouble Logging In?</h2>
            <p class="form-subtitle">Enter your registered email address or phone number. We will generate a secure new temporary password for your account.</p>
            
            <div id="forgot-error-alert" class="alert-box error hidden"></div>
            <div id="forgot-success-alert" class="alert-box success hidden"></div>

            <div class="input-group">
              <label for="reset-email">Email Address</label>
              <div class="input-wrapper">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="email" id="reset-email" placeholder="name@example.com" autocomplete="email">
              </div>
            </div>

            <div class="input-group">
              <label for="reset-phone">Or Phone Number</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" id="reset-phone" placeholder="+1 (555) 000-0000" autocomplete="tel">
              </div>
            </div>

            <button type="submit" id="btn-forgot-submit" class="btn-primary">
              <span>Generate New Password</span>
              <i class="fa-solid fa-key"></i>
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="footer-container">
      <p>&copy; 2026 Elevance Internship Platform. All security events are encrypted and logged.</p>
    </div>
  </footer>
  <script>
    document.getElementById('form-forgot-password').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('reset-email').value.trim();
      const phone = document.getElementById('reset-phone').value.trim();
      const errorAlert = document.getElementById('forgot-error-alert');
      const successAlert = document.getElementById('forgot-success-alert');
      const submitBtn = document.getElementById('btn-forgot-submit');
      
      errorAlert.classList.add('hidden');
      successAlert.classList.add('hidden');
      
      if (!email && !phone) {
        errorAlert.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> <span>Please provide either email address or phone number.</span>';
        errorAlert.classList.remove('hidden');
        return;
      }
      
      try {
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span>Generating...</span> <i class="fa-solid fa-spinner fa-spin"></i>';
        
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email || undefined, phone: phone || undefined })
        });
        
        const data = await response.json();
        
        if (!response.ok || !data.success) {
          throw new Error(data.message || 'An error occurred during password generation.');
        }
        
        successAlert.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${data.message}</span>`;
        successAlert.classList.remove('hidden');
        
        // Remove password display container if exists
        const existingContainer = document.getElementById('pwd-container');
        if (existingContainer) {
          existingContainer.remove();
        }
        
        // Basic display to user
        if (data.password) {
          const container = document.createElement('div');
          container.id = 'pwd-container';
          container.className = 'password-display-container';
          container.innerHTML = `
            <div class="password-display-title">Generated Password</div>
            <div class="password-display-value" id="generated-pwd">${data.password}</div>
            <button type="button" class="copy-btn" onclick="copyPassword()">
              <i class="fa-regular fa-copy"></i>
              <span id="copy-btn-text">Copy Password</span>
            </button>
          `;
          document.getElementById('form-forgot-password').appendChild(container);
        }
      } catch (err) {
        errorAlert.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> <span>${err.message}</span>`;
        errorAlert.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Generate New Password</span> <i class="fa-solid fa-key"></i>';
      }
    });

    function copyPassword() {
      const pwdText = document.getElementById('generated-pwd').textContent;
      navigator.clipboard.writeText(pwdText).then(() => {
        const copyText = document.getElementById('copy-btn-text');
        const icon = document.querySelector('.copy-btn i');
        
        copyText.textContent = 'Copied!';
        icon.className = 'fa-solid fa-check';
        
        setTimeout(() => {
          copyText.textContent = 'Copy Password';
          icon.className = 'fa-regular fa-copy';
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy: ', err);
      });
    }
  </script>
</body>
</html>
