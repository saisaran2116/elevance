<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elevance | Premium Internship Platform</title>
  <meta name="description" content="Elevance Internship Platform - Login Tracking and Premium Security Control Center. Monitor your account security and device logins.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
  </div>

  <header class="app-header">
    <div class="header-container">
      <div class="logo">
        <i class="fa-solid fa-graduation-cap logo-icon"></i>
        <span class="logo-text">ELEVANCE</span>
      </div>
      <nav class="app-nav">
        <button id="nav-btn-auth" class="nav-link active" onclick="switchTab('auth')">
          <i class="fa-solid fa-right-to-bracket"></i> Access
        </button>
        <button id="nav-btn-profile" class="nav-link hidden" onclick="switchTab('profile')">
          <i class="fa-solid fa-user-shield"></i> Profile & Security
        </button>
        <button id="nav-btn-logout" class="nav-link hidden logout-btn" onclick="handleLogout()">
          <i class="fa-solid fa-power-off"></i> Logout
        </button>
      </nav>
    </div>
  </header>
  <main class="main-content">
  </main>
  <footer class="app-footer">
    <div class="footer-container">
      <p>&copy; 2026 Elevance Internship Platform. All security events are encrypted and logged.</p>
    </div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
